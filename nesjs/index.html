<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>NES en el navegador (JSNES)</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0f1220;
      color: #eaeaf0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    header {
      display: flex;
      gap: 8px;
      padding: 8px;
      align-items: center;
      justify-content: center;
      background: #151836;
    }

    canvas {
      display: block;
      margin: 6px auto 4px;
      background: #000;
      border-radius: 12px;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 42vh;           /* 👈 más chico para que quepan botones */
      filter: contrast(1.15) saturate(1.1);
    }

    .controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 8px;
      background: linear-gradient(180deg, rgba(21,24,54,.7), rgba(15,18,32,.95));
      backdrop-filter: blur(6px);
      max-height: 48vh;          /* 👈 evita que se salga de pantalla */
    }

    .dpad {
      display: grid;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      place-items: center;
      justify-content: start;
      gap: 6px;
    }

    .mid {
      display: grid;
      place-items: center;
      gap: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 64px 64px;
      grid-template-rows: 64px 64px;
      place-items: center;
      justify-content: end;
      gap: 8px;
    }

    .btn {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #1f2350;
      color: #fff;
      font-size: 20px;
      border: none;
      box-shadow: 0 5px 0 #0b0e2a;
      touch-action: none;              /* 👈 CLAVE para Android */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .btn.big {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      font-weight: bold;
      font-size: 22px;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #0b0e2a;
    }
  </style>
</head>
<body>
  <header>
    <input type="file" id="romInput" accept=".nes">
    <button id="fsBtn" class="btn" style="width:auto;height:36px;padding:0 12px">Fullscreen</button>
  </header>

  <canvas id="screen" width="256" height="240"></canvas>

  <div class="controls">
    <!-- D-Pad -->
    <div class="dpad">
      <span></span>
      <button class="btn" data-btn="UP">⬆️</button>
      <span></span>

      <button class="btn" data-btn="LEFT">⬅️</button>
      <span></span>
      <button class="btn" data-btn="RIGHT">➡️</button>

      <span></span>
      <button class="btn" data-btn="DOWN">⬇️</button>
      <span></span>
    </div>

    <!-- Start / Select -->
    <div class="mid">
      <button class="btn" data-btn="START">Start</button>
      <button class="btn" data-btn="SELECT">Select</button>
    </div>

    <!-- A / B -->
    <div class="actions">
      <button class="btn big" data-btn="A">A</button>
      <button class="btn big" data-btn="B">B</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
