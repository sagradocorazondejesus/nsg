<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>NES en el navegador (JSNES)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f1220;
      color: #eaeaf0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    header {
      display: flex;
      gap: 8px;
      padding: 8px;
      align-items: center;
      justify-content: center;
      background: #151836;
    }

    canvas {
      display: block;
      margin: 8px auto;
      border-radius: 12px;
      background: #000;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 45vh;
    }

    .pad {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: linear-gradient(180deg, rgba(21,24,54,.6), rgba(15,18,32,.95));
      backdrop-filter: blur(6px);
    }

    .dpad, .actions {
      display: grid;
      place-items: center;
      gap: 8px;
    }

    .dpad {
      grid-template-columns: 70px 70px 70px;
      grid-template-rows: 70px 70px 70px;
      justify-content: start;
    }

    .actions {
      grid-template-columns: 90px 90px;
      grid-template-rows: 90px 90px;
      justify-content: end;
    }

    .btn {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: #1f2350;
      color: #fff;
      font-size: 22px;
      border: 0;
      box-shadow: 0 6px 0 #0b0e2a, inset 0 0 0 1px rgba(255,255,255,.1);
      touch-action: none;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0b0e2a;
      filter: brightness(1.1);
    }

    .btn.big {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      font-size: 26px;
      font-weight: 700;
    }

    .mid {
      display: grid;
      place-items: center;
      gap: 8px;
    }

    .mid .btn {
      width: 110px;
      height: 48px;
      border-radius: 999px;
      font-size: 16px;
    }

    .hint {
      opacity: .8;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <input type="file" id="romInput" accept=".nes" />
    <button id="fsBtn" class="btn" style="width:auto;height:40px;padding:0 12px">Fullscreen</button>
  </header>

  <canvas id="screen" width="256" height="240"></canvas>

  <div class="pad">
    <!-- D-Pad -->
    <div class="dpad">
      <span></span>
      <button class="btn" data-key="ArrowUp">⬆️</button>
      <span></span>

      <button class="btn" data-key="ArrowLeft">⬅️</button>
      <span></span>
      <button class="btn" data-key="ArrowRight">➡️</button>

      <span></span>
      <button class="btn" data-key="ArrowDown">⬇️</button>
      <span></span>
    </div>

    <!-- Start / Select -->
    <div class="mid">
      <button class="btn" data-key="Enter">Start</button>
      <button class="btn" data-key="ShiftRight">Select</button>
      <div class="hint">Toca la pantalla para fullscreen</div>
    </div>

    <!-- A / B -->
    <div class="actions">
      <button class="btn big" data-key="KeyZ">A</button>
      <button class="btn big" data-key="KeyX">B</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
