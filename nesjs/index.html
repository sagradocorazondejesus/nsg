<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>NES en el navegador (EmulatorJS)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <!-- Configuración EmulatorJS -->
  <script>
    window.EJS_player = "#game";
    window.EJS_core = "nes";
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
    window.EJS_startOnLoad = false;   // no iniciar hasta cargar ROM
    window.EJS_gameName = "NES en el navegador";
  </script>

  <!-- Carga EmulatorJS -->
  <script src="https://cdn.emulatorjs.org/stable/loader.js"></script>
</body>
</html>
