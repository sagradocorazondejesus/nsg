<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>NES en el navegador</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 8px;
    }

    canvas {
      width: 100%;
      max-width: 420px;
      image-rendering: pixelated;
      background: #000;
    }

    .controls {
      width: 100%;
      max-width: 420px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px;
      touch-action: none;
    }

    .dpad {
      grid-column: 1 / 2;
      display: grid;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      justify-content: center;
      align-items: center;
    }

    .dpad button {
      width: 60px;
      height: 60px;
      font-size: 22px;
      border-radius: 12px;
    }

    .actions {
      grid-column: 3 / 4;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .actions button {
      width: 90px;
      height: 90px;
      font-size: 22px;
      border-radius: 50%;
    }

    .middle {
      grid-column: 2 / 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    .middle button {
      width: 110px;
      height: 40px;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      background: #333;
      color: #fff;
      border: none;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.95);
      background: #555;
    }

    input[type="file"] {
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <input type="file" id="romInput" accept=".nes">
  <button id="fullscreenBtn">🔳 Pantalla completa</button>
</header>

<canvas id="screen" width="256" height="240"></canvas>

<div class="controls">
  <div class="dpad">
    <div></div>
    <button data-btn="UP">⬆️</button>
    <div></div>
    <button data-btn="LEFT">⬅️</button>
    <div></div>
    <button data-btn="RIGHT">➡️</button>
    <div></div>
    <button data-btn="DOWN">⬇️</button>
    <div></div>
  </div>

  <div class="middle">
    <button data-btn="SELECT">SELECT</button>
    <button data-btn="START">START</button>
  </div>

  <div class="actions">
    <button data-btn="B">B</button>
    <button data-btn="A">A</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
<script src="app.js"></script>

</body>
</html>
