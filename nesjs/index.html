<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NES en el navegador (JSNES)</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
    canvas { border: 1px solid #333; image-rendering: pixelated; max-width: 100%; }
    .controls button { padding: 10px 14px; margin: 6px; font-size: 16px; }
  </style>
</head>
<body>
  <h3>NES en el navegador 🎮</h3>

  <input type="file" id="romInput" accept=".nes" />
  <br/><br/>
  <canvas id="screen" width="256" height="240"></canvas>

  <div class="controls">
    <button data-key="ArrowUp">⬆️</button>
    <button data-key="ArrowLeft">⬅️</button>
    <button data-key="ArrowRight">➡️</button>
    <button data-key="ArrowDown">⬇️</button>
    <button data-key="KeyZ">A</button>
    <button data-key="KeyX">B</button>
    <button data-key="Enter">Start</button>
    <button data-key="ShiftRight">Select</button>
  </div>

  <!-- Librería JSNES desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
